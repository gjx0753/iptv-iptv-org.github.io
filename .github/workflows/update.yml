name: update
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'
permissions:
  contents: read
jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Update internal playlists
        id: playlist-update
        run: |
          npm run playlist:update
          echo "processed_issues=$(cat temp/logs/playlist_update.log)" >> $GITHUB_OUTPUT
      - name: Check internal playlists
        run: |
          npm run playlist:lint
          npm run playlist:validate
      - name: Generate public playlists
        run: npm run playlist:generate
      - name: Create .api/streams.json
        run: npm run playlist:export
      - name: Update readme
        run: npm run readme:update
