name: check
on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Get list of changed files
        id: files
        run: |
          ANY_CHANGED=false
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # 如果是 Pull Request，获取与 master 分支的差异
            git fetch origin master:master
            ALL_CHANGED_FILES=$(git diff --diff-filter=ACMRT --name-only master -- streams/ | tr '\n' ' ')
          else
            # 如果是手动触发，获取 streams 目录下的所有文件
            ALL_CHANGED_FILES=$(find streams/ -type f | tr '\n' ' ')
          fi

          if [ -n "${ALL_CHANGED_FILES}" ]; then
            ANY_CHANGED=true
          fi
          echo "all_changed_files=$ALL_CHANGED_FILES" >> "$GITHUB_OUTPUT"
          echo "any_changed=$ANY_CHANGED" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-node@v6
        if: steps.files.outputs.any_changed == 'true'
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        if: steps.files.outputs.any_changed == 'true'
        run: npm install
      - name: Validate changed files
        if: steps.files.outputs.any_changed == 'true'
        run: |
          npm run playlist:lint -- ${{ steps.files.outputs.all_changed_files }}
          npm run playlist:validate -- ${{ steps.files.outputs.all_changed_files }}
